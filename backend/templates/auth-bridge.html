{% extends "base.html" %}
{% block content %}
<section class="section auth">
  <div class="auth__card">
    <h1 class="brand__name">Подключаем сессию</h1>
    <p class="auth__hint" id="authBridgeStatus">Проверяем авторизацию и открываем страницу...</p>
    <p class="auth__hint">
      Если переход не сработал автоматически, <a class="link" href="{{ next_url }}">нажмите сюда</a>.
    </p>
  </div>
</section>
<script>
  const nextUrl = {{ next_url|tojson }};
  const tokenAuthEnabled = {{ auth_token_enabled|tojson }};
  const authStorageKey = window.__AUTH_STORAGE_KEY || "auth_token";
  const authQueryParam = window.__AUTH_QUERY_PARAM || "auth_token";
  const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || "";
  const statusNode = document.getElementById("authBridgeStatus");

  const setStatus = function (message) {
    if (statusNode) statusNode.textContent = message;
  };

  const redirectToNext = function () {
    window.location.replace(nextUrl);
  };

  const tokenFromHash = (() => {
    const hash = window.location.hash.replace(/^#/, "");
    if (!hash) return "";
    const params = new URLSearchParams(hash);
    return params.get(authQueryParam) || "";
  })();

  const token = (() => {
    try {
      if (tokenFromHash) {
        if (tokenAuthEnabled) {
          window.localStorage.setItem(authStorageKey, tokenFromHash);
        }
        return tokenFromHash;
      }
      if (!tokenAuthEnabled) {
        return "";
      }
      return window.localStorage.getItem(authStorageKey) || "";
    } catch (error) {
      console.warn("Failed to read auth token", error);
      return tokenFromHash;
    }
  })();

  if (!tokenAuthEnabled) {
    setStatus("Токеновый мост отключён. Открываем страницу через cookie-сессию.");
    window.setTimeout(redirectToNext, 50);
  } else if (!token) {
    setStatus("Не удалось получить токен входа. Откройте вход заново.");
  } else {
    setStatus("Сохраняем сессию...");
    window.fetch("/api/auth/session", {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json",
        "Authorization": `Bearer ${token}`,
        "X-CSRF-Token": csrfToken,
      },
      body: JSON.stringify({ token }),
    })
      .then(async (response) => {
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.error || `HTTP ${response.status}`);
        }
      })
      .catch((error) => {
        console.warn("Failed to sync auth session", error);
        setStatus("Не удалось восстановить сессию. Попробуйте войти ещё раз.");
        return Promise.reject(error);
      })
      .finally(() => {
        if (statusNode?.textContent === "Сохраняем сессию...") {
          redirectToNext();
        }
      });
  }
</script>
{% endblock %}
