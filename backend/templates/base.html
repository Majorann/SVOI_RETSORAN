<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="csrf-token" content="{{ csrf_token }}" />
    <meta name="referrer" content="origin" />
    <title>{{ title or "Свои — ресторан" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260402o') }}" />
    {% block extra_head %}{% endblock %}
    <style>
      body.auth-sync-pending .page {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="page">
      {% block content %}{% endblock %}
    </div>
    <script>
      window.__SESSION_USER_ID = {{ current_user_id|tojson }};
    </script>
    <script type="module" src="{{ url_for('static', filename='js/base.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
